  <line x1="14" y1="24" x2="16" y2="24" stroke="currentColor" stroke-width="0.5"/>
  <line x1="14" y1="26" x2="16" y2="26" stroke="currentColor" stroke-width="0.5"/>
  <line x1="14" y1="28" x2="16" y2="28" stroke="currentColor" stroke-width="0.5"/>
  <!-- Ноги -->
  <rect x="16" y="30" width="3" height="6" rx="1" fill="currentColor"/>
  <rect x="21" y="30" width="3" height="6" rx="1" fill="currentColor"/>
</svg>
