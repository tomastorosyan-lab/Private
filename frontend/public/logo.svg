  <!-- Тело -->
  <rect x="16" y="18" width="8" height="12" rx="2" fill="currentColor"/>
  <!-- Руки -->
  <rect x="10" y="20" width="3" height="8" rx="1.5" fill="currentColor" transform="rotate(-20 11.5 24)"/>
  <rect x="27" y="20" width="3" height="8" rx="1.5" fill="currentColor" transform="rotate(20 28.5 24)"/>
