services:
  frontend:
    image: node:20-alpine
    container_name: dis_frontend
    working_dir: /app
    command: sh -lc "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      - NEXT_PUBLIC_API_URL=SAME_ORIGIN
      - INTERNAL_API_ORIGIN=http://backend:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
